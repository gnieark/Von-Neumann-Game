<article id="alerts-panel" class="data-panel active">
    <div class="panel-heading">
        <div>
            <h2>{{t.tabAlerts}}</h2>
        </div>
        <button class="icon-button" data-refresh="alerts" type="button" title="{{t.refresh}}" aria-label="{{t.refresh}}">&#10227;</button>
    </div>
    <div id="console-alerts-list" class="console-alerts-list" aria-live="polite"></div>
    <p id="console-alerts-empty" class="sector-context">{{t.noActiveAlerts}}</p>
</article>
