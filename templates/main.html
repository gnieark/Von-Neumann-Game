<!doctype html>
<html lang="{{language}}">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="{{metaDescription}}">
    <title>{{pageTitle}}</title>
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="stylesheet" href="/assets/app.css?v={{assetVersion}}">
    <link rel="preload" href="{{i18nUrl}}" as="fetch" type="application/json" crossorigin="anonymous">
    <!-- BEGIN swaggerassets -->
    <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css">
    <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js" defer></script>
    <!-- END swaggerassets -->
    <script type="module" src="/assets/app.js?v={{assetVersion}}"></script>
</head>
<body>
    <header class="topbar">
        {{topheader}}
    </header>
    <main>
        {{mainContent}}
    </main>
    <footer class="site-footer">
        <a href="/about">{{t.aboutFooterLink}}</a>
        <a href="/changelog">{{t.changelogFooterLink}}</a>
        <a href="/stats">{{t.statsFooterLink}}</a>
        <a href="/api-docs">{{t.apiDocsFooterLink}}</a>
    </footer>
</body>
</html>
