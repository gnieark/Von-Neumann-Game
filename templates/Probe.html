<article id="probe-panel" class="data-panel active">
    <div class="panel-heading">
        <div>
            <h2>{{t.tabProbe}}</h2>
        </div>
        <button class="icon-button" data-refresh="probe" type="button" title="{{t.refresh}}" aria-label="{{t.refresh}}">⟳</button>
    </div>
    <div id="probe-terminal-alert" class="probe-terminal-alert" hidden></div>
    <div id="probe-summary" class="metrics" aria-live="polite">
        <div class="metric" data-metric="status">
            <span>{{t.status}}</span>
            <b id="probe-metric-status">-</b>
        </div>
        <div class="metric" data-metric="sensors">
            <span>{{t.sensors}}</span>
            <b id="probe-metric-sensors">-</b>
        </div>
        <div class="metric" data-metric="deuterium">
            <span>{{t.deuterium}}</span>
            <b id="probe-metric-deuterium">-</b>
        </div>
        <div class="metric" data-metric="sector">
            <span>{{t.sector}}</span>
            <b id="probe-metric-sector">-</b>
        </div>
        <div class="metric" data-metric="velocity">
            <span>{{t.velocityC}}</span>
            <b id="probe-metric-velocity">-</b>
        </div>
        <div class="metric" data-metric="heading">
            <span>{{t.heading}}</span>
            <b id="probe-metric-heading">-</b>
        </div>
    </div>
    <div id="probe-identity" class="probe-identity" aria-live="polite"></div>
    <p id="sector-context" class="sector-context" hidden></p>
    <section id="probe-logbook" class="probe-logbook" aria-live="polite">
        <div class="probe-logbook-actions sector-context">
            <button id="probe-logbook-prev" class="icon-button probe-logbook-button" type="button" title="{{t.logbookPreviousPage}}" aria-label="{{t.logbookPreviousPage}}" disabled>‹</button>
            <button id="probe-logbook-next" class="icon-button probe-logbook-button" type="button" title="{{t.logbookNextPage}}" aria-label="{{t.logbookNextPage}}" disabled>›</button>
            <button id="probe-logbook-add" class="icon-button probe-logbook-button" type="button" title="{{t.logbookAddPage}}" aria-label="{{t.logbookAddPage}}">+</button>
            <button id="probe-logbook-edit" class="icon-button probe-logbook-button" type="button" title="{{t.logbookEditPage}}" aria-label="{{t.logbookEditPage}}" disabled>✎</button>
            <button id="probe-logbook-delete" class="icon-button probe-logbook-button" type="button" title="{{t.logbookDeletePage}}" aria-label="{{t.logbookDeletePage}}" disabled>×</button>
        </div>
        <p id="probe-logbook-title" class="sector-summary probe-logbook-title">{{t.logbookLoading}}</p>
        <div id="probe-logbook-content" class="probe-logbook-content">{{t.logbookLoading}}</div>
        <form id="probe-logbook-form" class="probe-logbook-form" hidden>
            <label>{{t.logbookTitle}}<input name="title" maxlength="120" required></label>
            <label>{{t.logbookContent}}<textarea name="content" rows="8" maxlength="20000" required></textarea></label>
            <div class="probe-logbook-form-actions">
                <button type="submit">{{t.save}}</button>
                <button type="button" id="probe-logbook-cancel">{{t.cancel}}</button>
            </div>
        </form>
        <p id="probe-logbook-status" class="probe-logbook-status" hidden></p>
    </section>
</article>
