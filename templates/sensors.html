<article id="environment-panel" class="data-panel active">
    <div class="panel-heading">
        <div>
            <h2>{{t.tabEnvironment}}</h2>
        </div>
        <button class="icon-button" data-refresh="sector" type="button" title="{{t.refresh}}" aria-label="{{t.refresh}}">&#10227;</button>
    </div>
    <section class="sector-scan-section">
        <h3>{{t.sectorPreciseScanTitle}}</h3>
        <form id="sector-form" class="coordinate-form">
            <label>X<input name="x" type="number" step="1" value="0"></label>
            <label>Y<input name="y" type="number" step="1" value="0"></label>
            <label>Z<input name="z" type="number" step="1" value="0"></label>
            <button id="prepare-jump-button" type="button" hidden>{{t.prepareJump}}</button>
            <span id="sector-scan-control" class="scan-control">
                <button id="sector-scan-submit" type="submit">{{t.scan}}</button>
            </span>
        </form>
        <p id="sector-context" class="sector-context" aria-live="polite">{{t.loading}}</p>
        <p id="sector-summary" class="sector-summary" aria-live="polite">{{t.loading}}</p>
        <div id="sector-objects" class="sector-objects"></div>
        <p class="sector-units-hint">{{t.sectorUnitsHint}}</p>
    </section>
    <hr class="sector-scan-separator">
    <section class="sector-scan-section sector-neighbor-scan">
        <div class="sector-neighbor-heading">
            <h3>{{t.sectorNeighborScanTitle}}</h3>
            <button id="neighbor-scan-button" type="button">{{t.scan}}</button>
        </div>
        <p id="neighbor-scan-status" class="sector-neighbor-status" aria-live="polite" hidden></p>
        <div id="neighbor-sector-grid" class="neighbor-sector-grid" aria-live="polite"></div>
    </section>
    <hr class="sector-scan-separator">
    <section class="sector-scan-section sector-visited-history">
        <div class="sector-neighbor-heading">
            <h3>{{t.sectorVisitedHistoryTitle}}</h3>
            <button id="visited-history-toggle" type="button" aria-expanded="false" aria-controls="visited-sector-history-panel">{{t.view}}</button>
        </div>
        <div id="visited-sector-history-panel" hidden>
            <p id="visited-history-status" class="sector-neighbor-status" aria-live="polite" hidden></p>
            <div id="visited-sector-grid" class="neighbor-sector-grid" aria-live="polite"></div>
            <button id="visited-history-more" class="button-link visited-history-more" type="button" hidden>{{t.viewMore}}</button>
        </div>
    </section>
</article>
