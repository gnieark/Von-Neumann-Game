<article id="actions-panel" class="data-panel active">
    <div class="panel-heading">
        <div>
            <h2>{{t.tabActions}}</h2>
        </div>
        <button class="icon-button" data-refresh="movement" type="button" title="{{t.refresh}}" aria-label="{{t.refresh}}">&#10227;</button>
    </div>
    <div id="jump-checklist" class="jump-checklist" aria-live="polite"></div>
    <form id="move-form" class="action-panel" data-destruction-warning-distance="{{destructionWarningDistance}}" data-destruction-warning-risk-percent="{{destructionWarningRiskPercent}}">
        <label>{{t.targetX}}<input name="x" type="number" step="1" value="{{initialX}}"></label>
        <label>{{t.targetY}}<input name="y" type="number" step="1" value="{{initialY}}"></label>
        <label>{{t.targetZ}}<input name="z" type="number" step="1" value="{{initialZ}}"></label>
        <span id="jump-control" class="jump-control">
            <button id="move-submit" class="primary" type="submit">{{t.initiateJump}}</button>
        </span>
        <p id="movement-risk-warning" class="movement-risk-warning" hidden></p>
    </form>
    <section id="scut-transit-panel" class="scut-transit-panel">
        <h3>{{t.scutTransitCorridorsTitle}}</h3>
        <p class="sector-units-hint">{{t.scutTransitCorridorsHint}}</p>
        <div id="scut-transit-destinations" class="neighbor-sector-grid scut-transit-destinations"></div>
        <p id="scut-transit-empty" class="scut-transit-empty">{{t.scutTransitCorridorsEmpty}}</p>
    </section>
    <p id="action-status" class="action-status" aria-live="polite"></p>
</article>
