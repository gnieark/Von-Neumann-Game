  /api/probe/mind-snapshot/reassign:
    post:
      summary: Reassign a terminal probe mind snapshot
      description: >
        Available only when the current probe is dead or trapped by a black hole.
        Deletes the terminal probe state, assigns the player's last stable mind
        snapshot to a fresh probe chassis, resets the player's local reference
        frame, and marks the new origin as 0,0,0.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Mind snapshot reassigned to a fresh probe
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProbeMindSnapshotReassignResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
  /api/probe/storage-containers:
    get:
      summary: List probe storage containers
      description: >
        Returns the probe core storage and each additional container created
        from an additional_container inventory item. The deuterium tank is not
        managed here.
      responses:
        '200':
          description: Storage containers
          content:
            application/json:
              schema:
                type: object
                required: [containers]
                properties:
                  containers:
                    type: array
                    items:
                      $ref: '#/components/schemas/StorageContainer'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/probe/storage-containers/{containerId}:
    get:
      summary: Get one storage container content
      parameters:
        - $ref: '#/components/parameters/StorageContainerId'
      responses:
        '200':
          description: Container inventory
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StorageContainerInventoryResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      summary: Rename a storage container
      parameters:
        - $ref: '#/components/parameters/StorageContainerId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StorageContainerRenameRequest'
            example:
              label: Soute metaux
      responses:
        '200':
          description: Storage container renamed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StorageContainerRenameResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/probe/storage-containers/{containerId}/rules:
    patch:
      summary: Update storage routing rules for a container
      description: >
        Priority routes matching new items to this container first unless it is
        full. Exclusion avoids this container unless no other non-strict
        container can accept the item. Strict exclusion prevents automatic
        placement into this container.
      parameters:
        - $ref: '#/components/parameters/StorageContainerId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StorageContainerRules'
            example:
              priority: [metals]
              exclusion: [ice]
              strictExclusion: [manny]
      responses:
        '200':
          description: Rules updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StorageContainerRulesResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/probe/storage-moves:
    post:
      summary: Assign a Manny to move stock between containers
      description: >
        Starts a moving_stockage task on an idle onboard Manny. Unit items take
        10 seconds; resources take 10 seconds per 0.05 ECE. Destination free
        capacity is evaluated after subtracting cargo already reserved by other
        active storage moves toward the same container. additional_container
        items cannot be moved through this endpoint; while onboard, they remain
        linked to the probe internal storage.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StorageMoveRequest'
            examples:
              resource:
                value:
                  actorMannyId: mny_actor
                  kind: resource
                  resourceType: metals
                  amount: 0.1
                  fromContainerId: probe-core
                  toContainerId: container-itm_extra
              item:
                value:
                  actorMannyId: mny_actor
                  kind: item
                  itemIds: [itm_steel_bar, itm_steel_bar_2]
                  quantity: 2
                  toContainerId: container-itm_extra
      responses:
        '202':
          description: Storage move task accepted
          content:
            application/json:
              schema:
                type: object
                required: [manny, inventory]
                properties:
                  manny:
                    $ref: '#/components/schemas/Manny'
                  inventory:
                    $ref: '#/components/schemas/ProbeInventory'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Manny unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Move is impossible because of capacity or item rules
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/probe/probe-improvements-available:
    get:
      summary: List available probe improvements
      description: >
        Returns probe improvements whose blueprints are known by the player
        owning the selected probe. The `done` flag is evaluated for that
        selected probe only. Pass `includeAll=1` to include locked catalog
        entries as unavailable.
      parameters:
        - in: query
          name: includeAll
          schema:
            type: boolean
          required: false
          description: Include locked improvements from the gameplay catalog.
      responses:
        '200':
          description: Probe improvements known by the authenticated player for the selected probe
          content:
            application/json:
              schema:
                type: object
                required: [improvements]
                properties:
                  improvements:
                    type: array
                    items:
                      $ref: '#/components/schemas/ProbeImprovement'
              example:
                improvements:
                  - id: deuterium_compression
                    name: Deuterium compression
                    description: Compresses the external deuterium tank reserve so it can hold up to 200% fuel.
                    available: true
                    done: false
                    durationSeconds: 300
                    ingredients:
                      - type: electric_motor
                        quantity: 1
                        unit: item
                        kind: item
                      - type: steel_bar
                        quantity: 2
                        unit: item
                        kind: item
                    effects:
                      maxDeuteriumPercent: 200
                  - id: reinforced_container_couplings
                    name: Reinforced container couplings
                    description: Reinforces external container couplings so five additional containers are ignored when movement break risk is calculated.
                    available: true
                    done: false
                    durationSeconds: 300
                    ingredients:
                      - type: integrated_circuit
                        quantity: 1
                        unit: item
                        kind: item
                      - type: carbon_compounds
                        quantity: 0.4
                        unit: earth_container_equivalent
                        kind: resource
                    effects:
                      fragileContainerRiskAdditionalContainerDiscount: 5
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/probe/messages:
    get:
      summary: List messages received by the current probe
      description: >
        Returns messages where the authenticated player's probe is the
        recipient. Messages are sorted newest first, include their read
        status, and are limited to the 50 latest messages by default.
      parameters:
        - name: limit
          in: query
          required: false
          description: Maximum number of messages to return. Defaults to 50.
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - name: offset
          in: query
          required: false
          description: Number of newest messages to skip before returning the page.
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: Received probe messages
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProbeMessagesResponse'
              example:
                messages:
                  - id: 12
                    sender:
                      type: planet
                      id: planet-abc123
                      planetId: planet-abc123
                      name: Pale Signal
                    recipient:
                      type: probe
                      id: 1
                      probeId: 1
                      name: Probe of remi
                    sector:
                      relative: { x: 0, y: 0, z: 0 }
                    body: Signal local reçu.
                    status: unread
                    readAt: null
                    createdAt: '2026-06-06T12:00:00+00:00'
                    updatedAt: '2026-06-06T12:00:00+00:00'
                  - id: 13
                    sender:
                      type: probe
                      id: 2
                      probeId: 2
                      name: Probe of nova
                    recipient:
                      type: probe
                      id: 1
                      probeId: 1
                      name: Probe of remi
                    sector:
                      relative: { x: 0, y: 0, z: 0 }
                    body: Signal local reçu.
                    status: unread
                    readAt: null
                    createdAt: '2026-06-06T12:00:00+00:00'
                    updatedAt: '2026-06-06T12:00:00+00:00'
                pagination:
                  limit: 50
                  offset: 0
                  count: 2
                  total: 67
                  hasMore: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '400':
          $ref: '#/components/responses/BadRequest'
    post:
      summary: Send a message to a reachable probe or inhabited planet
      description: >
        Creates an unread message from the current probe to a recipient.
        Probe recipients must be in the exact same sector as the sender probe,
        or both probes must be inside coverage of the same active SCUT relay
        network. Planet recipients must be inhabited planets in the current
        sector. If the recipient type is omitted, `probe` is used.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProbeMessageSendRequest'
            example:
              recipient:
                type: planet
                id: planet-abc123
              body: Signal local reçu ?
      responses:
        '201':
          description: Probe message sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProbeMessageResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Recipient is invalid or outside local/SCUT communication range
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/probe/scut-network/{scutNetworkId}:
    get:
      summary: Inspect a SCUT relay network covering the current probe
      parameters:
        - $ref: '#/components/parameters/ScutNetworkId'
      responses:
        '200':
          description: SCUT network details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScutNetworkResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Probe is outside this network coverage
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/probe/messages/sent:
    get:
      summary: List messages sent by the current probe
      description: >
        Returns messages where the authenticated player's probe is the sender.
        Messages are sorted newest first and are limited to the 50 latest
        messages by default. This endpoint does not expose recipient read
        state fields.
      parameters:
        - name: limit
          in: query
          required: false
          description: Maximum number of messages to return. Defaults to 50.
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - name: offset
          in: query
          required: false
          description: Number of newest messages to skip before returning the page.
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: Sent probe messages
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProbeSentMessagesResponse'
              example:
                messages:
                  - id: 12
                    sender:
                      type: probe
                      id: 1
                      probeId: 1
                      name: Probe of remi
                    recipient:
                      type: planet
                      id: planet-abc123
                      planetId: planet-abc123
                      name: Pale Signal
                    sector:
                      relative: { x: 0, y: 0, z: 0 }
                    body: Signal local reçu ?
                    createdAt: '2026-06-06T12:00:00+00:00'
                pagination:
                  limit: 50
                  offset: 0
                  count: 1
                  total: 3
                  hasMore: false
        '401':
          $ref: '#/components/responses/Unauthorized'
        '400':
          $ref: '#/components/responses/BadRequest'
  /api/probe/messages/{messageId}/read:
    patch:
      summary: Mark a received probe message as read
      description: >
        Only the recipient probe can mark a message as read. Repeating the call
        on an already-read message is safe and returns the message unchanged.
      parameters:
        - $ref: '#/components/parameters/ProbeMessageId'
      responses:
        '200':
          description: Probe message marked read
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProbeMessageResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
