openapi: 3.0.3
info:
  title: Von Neumann Game API
  version: '86'
servers:
  - url: /
    description: Current host
security:
  - bearerAuth: []
paths:
  /api/version:
    get:
      security: []
      summary: Get API version
      responses:
        '200':
          description: Current API version
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiVersionResponse'
              example:
                apiVersion: 86
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
  /api/session:
    post:
      security: []
      summary: Create a password session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionRequest'
            example:
              username: remi
              password: secret
      responses:
        '200':
          description: Session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
              example:
                token: eyJlocalExampleToken
                expiresAt: '2026-05-28T12:00:00+00:00'
                player:
                  id: 1
                  username: remi
                  displayName: Remi
                  forumAdmin: false
                  forumModerator: false
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
  /api/me:
    get:
      summary: Get authenticated player
      responses:
        '200':
          description: Current player
          content:
            application/json:
              schema:
                type: object
                required: [player]
                properties:
                  player:
                    $ref: '#/components/schemas/Player'
              example:
                player:
                  id: 1
                  username: remi
                  displayName: Remi
                  forumAdmin: false
                  forumModerator: false
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/me/api-key:
    post:
      summary: Create an API key for the authenticated player
      description: >
        Returns a new API key that can be used as a Bearer token on protected
        API endpoints. The clear token is shown only in this response; only its
        hash is stored server-side.
      responses:
        '201':
          description: API key created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyResponse'
              example:
                apiKey:
                  id: 1
                  token: vng_exampleGeneratedSecret
                  label: default
                  lastFour: cret
                  createdAt: '2026-06-01T12:00:00+00:00'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/crafting-recipes:
    get:
      summary: List available crafting recipes
      responses:
        '200':
          description: Available crafting recipes
          content:
            application/json:
              schema:
                type: object
                required: [recipes]
                properties:
                  recipes:
                    type: array
                    items:
                      $ref: '#/components/schemas/CraftingRecipe'
              example:
                recipes:
                  - id: waypoint_bookmark
                    name: Waypoint bookmark
                    description: A transmitting beacon placed on an object such as an asteroid or planet, or set in orbit around a star or gas giant. Its message can be read by every Neumann probe present in the sector.
                    craftableBy: [manny]
                    ingredients:
                      - type: metals
                        quantity: 0.01
                        unit: earth_container_equivalent
                    durationSeconds: 600
                    output:
                      type: waypoint_bookmark
                      name: Waypoint bookmark
                      containerSpace: 0.01
                      containerSpaceUnit: earth_container_equivalent
                  - id: integrated_circuit
                    name: Integrated circuit
                    description: A dense logic component combining conductors, insulators, substrate, and dopants.
                    craftableBy: [atomic_3d_printer]
                    ingredients:
                      - type: micro_conductor
                        quantity: 2
                        unit: item
                      - type: ceramic_insulator
                        quantity: 2
                        unit: item
                      - type: crystal_substrate
                        quantity: 1
                        unit: item
                      - type: dopant_matrix
                        quantity: 1
                        unit: item
                      - type: deuterium
                        quantity: 0.05
                        unit: earth_container_equivalent
                    durationSeconds: 1200
                    output:
                      type: integrated_circuit
                      name: Integrated circuit
                      containerSpace: 0.001
                      containerSpaceUnit: earth_container_equivalent
                  - id: solar_panel
                    name: Solar panel
                    description: A foldable photovoltaic panel with printed conductors, crystal substrate, and a reinforced mounting plate.
                    craftableBy: [manny]
                    ingredients:
                      - type: micro_conductor
                        quantity: 2
                        unit: item
                      - type: crystal_substrate
                        quantity: 1
                        unit: item
                      - type: ceramic_insulator
                        quantity: 1
                        unit: item
                      - type: steel_plate
                        quantity: 1
                        unit: item
                      - type: metals
                        quantity: 0.02
                        unit: earth_container_equivalent
                    durationSeconds: 1800
                    output:
                      type: solar_panel
                      name: Solar panel
                      containerSpace: 0.015
                      containerSpaceUnit: earth_container_equivalent
                  - id: atomic_printer_part
                    name: Atomic printer part
                    description: A precision replacement block printed at atomic scale for high-energy fabrication systems.
                    craftableBy: [atomic_3d_printer]
                    ingredients:
                      - type: micro_conductor
                        quantity: 2
                        unit: item
                      - type: ceramic_insulator
                        quantity: 1
                        unit: item
                      - type: crystal_substrate
                        quantity: 1
                        unit: item
                      - type: dopant_matrix
                        quantity: 1
                        unit: item
                      - type: deuterium
                        quantity: 0.05
                        unit: earth_container_equivalent
                    durationSeconds: 2700
                    output:
                      type: atomic_printer_part
                      name: Atomic printer part
                      containerSpace: 0.01
                      containerSpaceUnit: earth_container_equivalent
                  - id: deuterium_engine
                    name: Deuterium engine
                    description: A compact propulsion module that channels stored deuterium through printed control parts.
                    craftableBy: [manny]
                    ingredients:
                      - type: atomic_printer_part
                        quantity: 1
                        unit: item
                      - type: integrated_circuit
                        quantity: 1
                        unit: item
                      - type: electric_motor
                        quantity: 2
                        unit: item
                      - type: battery_pack
                        quantity: 1
                        unit: item
                      - type: linear_actuator
                        quantity: 1
                        unit: item
                      - type: steel_plate
                        quantity: 4
                        unit: item
                      - type: deuterium
                        quantity: 0.5
                        unit: earth_container_equivalent
                    durationSeconds: 7200
                    output:
                      type: deuterium_engine
                      name: Deuterium engine
                      containerSpace: 0.06
                      containerSpaceUnit: earth_container_equivalent
                  - id: scut_relay
                    name: SCUT relay
                    description: A long-range SCUT communication relay module with its own solar power array, buffer batteries, control circuits, and deployable structure.
                    craftableBy: [manny]
                    ingredients:
                      - type: steel_plate
                        quantity: 32
                        unit: item
                      - type: steel_bar
                        quantity: 28
                        unit: item
                      - type: battery_pack
                        quantity: 6
                        unit: item
                      - type: solar_panel
                        quantity: 4
                        unit: item
                      - type: integrated_circuit
                        quantity: 5
                        unit: item
                      - type: electric_motor
                        quantity: 4
                        unit: item
                      - type: linear_actuator
                        quantity: 2
                        unit: item
                    durationSeconds: 172800
                    output:
                      type: scut_relay
                      name: SCUT relay
                      containerSpace: 0.12
                      containerSpaceUnit: earth_container_equivalent
                  - id: manny
                    name: Manny
                    craftableBy: [manny]
                    ingredients:
                      - type: linear_actuator
                        quantity: 6
                        unit: item
                      - type: electric_motor
                        quantity: 12
                        unit: item
                      - type: battery_pack
                        quantity: 4
                        unit: item
                      - type: integrated_circuit
                        quantity: 6
                        unit: item
                    durationSeconds: 3600
                    output:
                      type: manny
                      name: Manny
                      containerSpace: 0.05
                      containerSpaceUnit: earth_container_equivalent
                      cargoCapacity: 0.05
                      cargoCapacityUnit: earth_container_equivalent
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/forum/categories:
    get:
      summary: List forum categories
      responses:
        '200':
          description: Forum categories ordered by sortOrder
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForumCategoriesResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      summary: Create a forum category
      description: Requires forum administrator permission.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForumCategoryWriteRequest'
      responses:
        '201':
          description: Forum category created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForumCategoryResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/forum/categories/{categoryId}:
    get:
      summary: Get a forum category
      parameters:
        - $ref: '#/components/parameters/ForumCategoryId'
      responses:
        '200':
          description: Forum category
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForumCategoryResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      summary: Update a forum category
      description: Requires forum administrator permission. Use sortOrder to reorder categories.
      parameters:
        - $ref: '#/components/parameters/ForumCategoryId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForumCategoryPatchRequest'
      responses:
        '200':
          description: Forum category updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForumCategoryResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      summary: Delete a forum category
      description: Requires forum administrator permission. Deletes posts and messages inside the category.
      parameters:
        - $ref: '#/components/parameters/ForumCategoryId'
      responses:
        '200':
          description: Forum category deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/forum/posts:
    get:
      summary: List forum posts
      description: Returns pinned posts first, then the most recently active posts. Defaults to 50 posts.
      parameters:
        - name: categoryId
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: Forum posts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForumPostsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      summary: Create a forum post
      description: Creates a post and its first forum message.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForumPostCreateRequest'
      responses:
        '201':
          description: Forum post created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForumPostResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/forum/posts/{postId}:
    get:
      summary: Get a forum post with its first message and recent replies
      description: Returns the post, its first message, and the 50 most recent replies by default. Use limit and offset to load older replies.
      parameters:
        - $ref: '#/components/parameters/ForumPostId'
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: Forum post with messages
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForumPostWithMessagesResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      summary: Moderate a forum post
      description: Forum moderators and forum admins can edit title/category and pin or unpin the post.
      parameters:
        - $ref: '#/components/parameters/ForumPostId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForumPostPatchRequest'
      responses:
        '200':
          description: Forum post updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForumPostResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      summary: Delete a forum post
      description: Requires forum moderator or forum admin permission.
      parameters:
        - $ref: '#/components/parameters/ForumPostId'
      responses:
        '200':
          description: Forum post deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/forum/posts/{postId}/messages:
    get:
      summary: List replies for a forum post
      description: Returns the 50 most recent replies by default. Use limit and offset to load older replies. The initial post message is exposed as firstMessage on the post detail response.
      parameters:
        - $ref: '#/components/parameters/ForumPostId'
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: Forum messages
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForumMessagesResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      summary: Reply to a forum post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForumMessageWriteRequest'
      parameters:
        - $ref: '#/components/parameters/ForumPostId'
      responses:
        '201':
          description: Forum message created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForumMessageResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/forum/messages/{messageId}:
    patch:
      summary: Edit a forum message
      description: The original author can edit their own message. Forum moderators and forum admins can edit any message.
      parameters:
        - $ref: '#/components/parameters/ForumMessageId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForumMessageWriteRequest'
      responses:
        '200':
          description: Forum message updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForumMessageResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      summary: Delete a forum message
      description: Requires forum moderator or forum admin permission.
      parameters:
        - $ref: '#/components/parameters/ForumMessageId'
      responses:
        '200':
          description: Forum message deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/probe:
    get:
      summary: Get default Neumann probe
      responses:
        '200':
          description: Default probe
          content:
            application/json:
              schema:
                type: object
                required: [probe]
                properties:
                  probe:
                    $ref: '#/components/schemas/Probe'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/probe/{probeId}:
    get:
      summary: Get a Neumann probe by id
      description: >
        Returns the requested probe only when it belongs to the authenticated
        player. When the requested owned probe is neither in the same sector as
        the default probe nor inside shared SCUT network coverage, the response
        is limited to id, name, status `out_of_scut_range`, and relative sector
        telemetry.
      parameters:
        - name: probeId
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Requested probe
          content:
            application/json:
              schema:
                type: object
                required: [probe]
                properties:
                  probe:
                    oneOf:
                      - $ref: '#/components/schemas/Probe'
                      - $ref: '#/components/schemas/ProbeLimitedTelemetry'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      summary: Update a Neumann probe
      description: >
        Renames the requested owned probe when `name` is provided. When
        `isDefault` is true, sets the requested owned probe as the player's
        default probe. The current default probe and the requested probe must
        be in the same sector, or both sectors must be covered by the same
        active SCUT network, before the default probe can be changed.
      parameters:
        - name: probeId
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProbePatchRequest'
            example:
              name: New probe name
              isDefault: true
      responses:
        '200':
          description: Default probe updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProbeListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Target probe is outside same-sector and same-SCUT reach
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/probes:
    get:
      summary: List player Neumann probes
      responses:
        '200':
          description: Player probes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProbeListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/probe/mission:
    get:
      summary: List active player missions
      description: Alias of /api/probe/missions kept for clients that use a singular mission route.
      responses:
        '200':
          description: Active missions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MissionListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/probe/missions:
    get:
      summary: List active player missions
      description: Returns missions currently assigned to the authenticated player.
      responses:
        '200':
          description: Active missions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MissionListResponse'
              example:
                missions: []
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/probe/missions/{missionId}/abandon:
    post:
      summary: Abandon an active probe mission
      parameters:
        - $ref: '#/components/parameters/MissionId'
      responses:
        '200':
          description: Mission abandoned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MissionResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Mission is already terminal and cannot be abandoned again
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/probe/{probeId}/storage-containers:
    parameters:
      - $ref: '#/components/parameters/ProbeId'
    get:
      $ref: '#/paths/~1api~1probe~1storage-containers/get'
  /api/probe/{probeId}/storage-containers/{containerId}:
    parameters:
      - $ref: '#/components/parameters/ProbeId'
    get:
      $ref: '#/paths/~1api~1probe~1storage-containers~1%7BcontainerId%7D/get'
    patch:
      $ref: '#/paths/~1api~1probe~1storage-containers~1%7BcontainerId%7D/patch'
  /api/probe/{probeId}/storage-containers/{containerId}/rules:
    parameters:
      - $ref: '#/components/parameters/ProbeId'
    patch:
      $ref: '#/paths/~1api~1probe~1storage-containers~1%7BcontainerId%7D~1rules/patch'
  /api/probe/{probeId}/storage-moves:
    parameters:
      - $ref: '#/components/parameters/ProbeId'
    post:
      $ref: '#/paths/~1api~1probe~1storage-moves/post'
  /api/probe/{probeId}/probe-improvements-available:
    parameters:
      - $ref: '#/components/parameters/ProbeId'
    get:
      $ref: '#/paths/~1api~1probe~1probe-improvements-available/get'
  /api/probe/{probeId}/messages:
    parameters:
      - $ref: '#/components/parameters/ProbeId'
    get:
      $ref: '#/paths/~1api~1probe~1messages/get'
    post:
      $ref: '#/paths/~1api~1probe~1messages/post'
  /api/probe/{probeId}/scut-network/{scutNetworkId}:
    parameters:
      - $ref: '#/components/parameters/ProbeId'
    get:
      $ref: '#/paths/~1api~1probe~1scut-network~1%7BscutNetworkId%7D/get'
  /api/probe/{probeId}/messages/{messageId}/read:
    parameters:
      - $ref: '#/components/parameters/ProbeId'
    patch:
      $ref: '#/paths/~1api~1probe~1messages~1%7BmessageId%7D~1read/patch'
  /api/probe/{probeId}/alerts:
    parameters:
      - $ref: '#/components/parameters/ProbeId'
    get:
      $ref: '#/paths/~1api~1probe~1alerts/get'
  /api/probe/{probeId}/alerts/{alertId}:
    parameters:
      - $ref: '#/components/parameters/ProbeId'
    patch:
      $ref: '#/paths/~1api~1probe~1alerts~1%7BalertId%7D/patch'
  /api/probe/{probeId}/damage-warnings:
    parameters:
      - $ref: '#/components/parameters/ProbeId'
    get:
      $ref: '#/paths/~1api~1probe~1damage-warnings/get'
  /api/probe/{probeId}/damage-warnings/{damageWarningId}:
    parameters:
      - $ref: '#/components/parameters/ProbeId'
    patch:
      $ref: '#/paths/~1api~1probe~1damage-warnings~1%7BdamageWarningId%7D/patch'
  /api/probe/{probeId}/visited-sectors:
    parameters:
      - $ref: '#/components/parameters/ProbeId'
    get:
      $ref: '#/paths/~1api~1probe~1visited-sectors/get'
  /api/probe/{probeId}/sector:
    parameters:
      - $ref: '#/components/parameters/ProbeId'
    get:
      $ref: '#/paths/~1api~1probe~1sector/get'
  /api/probe/{probeId}/move:
    parameters:
      - $ref: '#/components/parameters/ProbeId'
    post:
      $ref: '#/paths/~1api~1probe~1move/post'
  /api/probe/{probeId}/inventory/{itemId}:
    parameters:
      - $ref: '#/components/parameters/ProbeId'
    get:
      $ref: '#/paths/~1api~1probe~1inventory~1%7BitemId%7D/get'
  /api/probe/{probeId}/inventory/{itemId}/jettison:
    parameters:
